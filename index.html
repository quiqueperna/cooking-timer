<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chef Timer Pro</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👨‍🍳</text></svg>">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes alert-bg { 0%, 100% { background-color: #09090b; } 50% { background-color: #7f1d1d; } }
        .alarma-activa { animation: alert-bg 0.6s infinite; }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [recetas, setRecetas] = useState(() => JSON.parse(localStorage.getItem('mis_recetas_v5') || '[]'));
            const [nombreReceta, setNombreReceta] = useState("");
            const [descripcion, setDescripcion] = useState("");
            const [pasos, setPasos] = useState([{ id: Date.now(), instruccion: "Nuevo Paso", min: 1, seg: 0 }]);
            const [pasoActual, setPasoActual] = useState(null);
            const [segundosTotales, setSegundosTotales] = useState(0);
            const [corriendo, setCorriendo] = useState(false);
            const [alarmaSonando, setAlarmaSonando] = useState(false);
            
            const audioRef = useRef(new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg'));
            audioRef.current.loop = true;
            const ultimoInputRef = useRef(null);

            useEffect(() => {
                localStorage.setItem('mis_recetas_v5', JSON.stringify(recetas));
            }, [recetas]);

            useEffect(() => {
                if (ultimoInputRef.current) {
                    ultimoInputRef.current.focus();
                    ultimoInputRef.current.select();
                }
            }, [pasos.length]);

            const agregarPaso = () => {
                setPasos([...pasos, { id: Date.now(), instruccion: `Paso ${pasos.length + 1}`, min: 1, seg: 0 }]);
            };
            
            const editarPaso = (index, campo, valor) => {
                const nuevosPasos = [...pasos];
                nuevosPasos[index][campo] = valor;
                setPasos(nuevosPasos);
            };

            const guardarReceta = () => {
                if (!nombreReceta) return alert("Ponéle un nombre a la receta");
                const nueva = { id: Date.now(), nombre: nombreReceta, descripcion, pasos: [...pasos] };
                setRecetas([nueva, ...recetas]);
                setNombreReceta("");
                setDescripcion("");
                alert("¡Receta guardada!");
            };

            const cargarReceta = (r) => {
                setPasos(r.pasos);
                setNombreReceta(r.nombre);
                setDescripcion(r.descripcion || "");
            };

            const iniciarCocina = (index = 0) => {
                if (pasos.length > 0) {
                    setPasoActual(index);
                    setSegundosTotales(pasos[index].min * 60 + pasos[index].seg);
                    setCorriendo(true);
                }
            };

            const detenerAlarma = () => {
                audioRef.current.pause();
                audioRef.current.currentTime = 0;
                setAlarmaSonando(false);
                if (pasoActual < pasos.length - 1) {
                    const siguiente = pasoActual + 1;
                    setPasoActual(siguiente);
                    setSegundosTotales(pasos[siguiente].min * 60 + pasos[siguiente].seg);
                    setCorriendo(true);
                } else {
                    setPasoActual(null);
                }
            };

            useEffect(() => {
                let timer;
                if (corriendo && segundosTotales > 0) {
                    timer = setInterval(() => setSegundosTotales(s => s - 1), 1000);
                } else if (segundosTotales === 0 && corriendo) {
                    setCorriendo(false);
                    setAlarmaSonando(true);
                    audioRef.current.play().catch(() => {});
                }
                return () => clearInterval(timer);
            }, [corriendo, segundosTotales]);

            const formatoDisplay = (s) => {
                const m = Math.floor(s / 60);
                const seg = s % 60;
                return `${m}:${seg.toString().padStart(2, '0')}`;
            };

            return (
                <div class={`min-h-screen ${alarmaSonando ? 'alarma-activa' : ''} p-4 md:p-8 transition-colors duration-500`}>
                    <div class="max-w-5xl mx-auto flex flex-col lg:flex-row gap-8">
                        
                        {/* EDITOR PRINCIPAL */}
                        {pasoActual === null && (
                            <div class="flex-1 bg-zinc-900/50 backdrop-blur-sm p-6 rounded-[2rem] border border-zinc-800 shadow-2xl">
                                <div class="flex items-center gap-3 mb-8">
                                    <span class="text-4xl">👨‍🍳</span>
                                    <div>
                                        <h1 class="text-2xl font-black text-white tracking-tighter uppercase italic leading-none">Chef Timer</h1>
                                        <p class="text-zinc-500 text-[10px] font-bold tracking-[0.3em] uppercase">Pro Kitchen Tools</p>
                                    </div>
                                </div>
                                
                                <div class="space-y-4 mb-8">
                                    <input 
                                        type="text" placeholder="¿Qué vamos a cocinar?"
                                        class="w-full bg-zinc-800 p-5 rounded-2xl border border-zinc-700 outline-none focus:border-orange-500 font-bold text-lg transition-all"
                                        value={nombreReceta} onChange={(e) => setNombreReceta(e.target.value)}
                                    />
                                    <textarea 
                                        placeholder="Descripción rápida, tips o ingredientes clave..."
                                        class="w-full bg-zinc-800 p-4 rounded-2xl border border-zinc-700 outline-none focus:border-orange-500 text-sm resize-none h-20"
                                        value={descripcion} onChange={(e) => setDescripcion(e.target.value)}
                                    />
                                </div>

                                <div class="space-y-3 mb-8 max-h-[45vh] overflow-y-auto pr-2 custom-scroll">
                                    <p class="text-[10px] font-black text-zinc-600 uppercase tracking-widest px-2 mb-2">Cronograma de Pasos</p>
                                    {pasos.map((p, i) => (
                                        <div key={p.id} class="flex flex-col sm:flex-row gap-3 bg-zinc-950/80 p-4 rounded-2xl border border-zinc-800 items-center group transition-all hover:border-zinc-700">
                                            <input 
                                                ref={i === pasos.length - 1 ? ultimoInputRef : null}
                                                type="text" 
                                                class="flex-1 bg-transparent outline-none font-semibold focus:text-orange-400 w-full sm:w-auto" 
                                                value={p.instruccion} 
                                                onChange={(e) => editarPaso(i, 'instruccion', e.target.value)}
                                            />
                                            <div class="flex items-center gap-2">
                                                <div class="flex items-center bg-zinc-800 rounded-xl px-2">
                                                    <input type="number" class="w-10 bg-transparent py-2 text-center font-bold text-orange-500 outline-none" value={p.min} onChange={(e) => editarPaso(i, 'min', parseInt(e.target.value) || 0)} onFocus={(e) => e.target.select()}/>
                                                    <span class="text-[9px] font-bold text-zinc-600 mr-2">M</span>
                                                    <input type="number" class="w-10 bg-transparent py-2 text-center font-bold text-orange-500 outline-none" value={p.seg} onChange={(e) => editarPaso(i, 'seg', Math.min(59, parseInt(e.target.value) || 0))} onFocus={(e) => e.target.select()}/>
                                                    <span class="text-[9px] font-bold text-zinc-600 mr-1">S</span>
                                                </div>
                                                <button onClick={() => setPasos(pasos.filter((_, idx) => idx !== i))} class="p-2 text-zinc-700 hover:text-red-500 transition-colors">✕</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div class="grid grid-cols-2 gap-4">
                                    <button onClick={agregarPaso} class="py-4 border-2 border-dashed border-zinc-800 rounded-2xl text-zinc-500 font-black hover:text-zinc-200 hover:border-zinc-600 transition-all text-xs uppercase tracking-widest">+ Agregar Paso</button>
                                    <button onClick={guardarReceta} class="py-4 bg-zinc-800 border border-zinc-700 rounded-2xl font-black text-zinc-300 hover:bg-zinc-700 transition-all text-xs uppercase tracking-widest">💾 Guardar Lista</button>
                                    <button onClick={() => iniciarCocina(0)} class="col-span-2 py-5 bg-orange-600 rounded-2xl font-black text-xl hover:bg-orange-500 transition-all shadow-xl shadow-orange-950/20 active:scale-95 uppercase tracking-tighter">Iniciar Temporizador</button>
                                </div>
                            </div>
                        )}

                        {/* MODO COCINA ACTIVO */}
                        {pasoActual !== null && (
                            <div class="flex-1 bg-zinc-900 p-8 md:p-16 rounded-[3.5rem] border-4 border-orange-600 text-center shadow-2xl relative overflow-hidden flex flex-col justify-center min-h-[70vh]">
                                <div class="absolute top-8 left-0 right-0 px-8 flex justify-between items-center">
                                    <span class="bg-orange-600 text-white text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Paso {pasoActual + 1} de {pasos.length}</span>
                                    <span class="text-zinc-500 font-bold text-xs uppercase tracking-widest">{nombreReceta}</span>
                                </div>

                                <div class="mt-8">
                                    {descripcion && <p class="text-zinc-500 italic text-sm mb-6 max-w-md mx-auto line-clamp-2">"{descripcion}"</p>}
                                    <h3 class="text-4xl md:text-6xl font-black mb-8 leading-tight tracking-tighter">{pasos[pasoActual].instruccion}</h3>
                                    <div class="text-[120px] md:text-[180px] font-black leading-none mb-12 tabular-nums tracking-tighter text-white drop-shadow-2xl">
                                        {formatoDisplay(segundosTotales)}
                                    </div>
                                </div>

                                {alarmaSonando ? (
                                    <button onClick={detenerAlarma} class="w-full py-10 bg-white text-black rounded-3xl font-black text-4xl shadow-2xl animate-bounce hover:bg-zinc-100 transition-colors">APAGAR ALARMA</button>
                                ) : (
                                    <div class="flex gap-4 max-w-md mx-auto w-full">
                                        <button onClick={() => setCorriendo(!corriendo)} class={`flex-1 py-6 rounded-2xl font-black text-xl transition-all ${corriendo ? 'bg-zinc-800 text-zinc-500' : 'bg-white text-black hover:scale-105 active:scale-95'}`}>
                                            {corriendo ? 'PAUSA' : 'CONTINUAR'}
                                        </button>
                                        <button onClick={() => { audioRef.current.pause(); setPasoActual(null); }} class="px-8 py-6 bg-zinc-950 rounded-2xl font-bold text-zinc-600 hover:text-red-500 transition-colors">SALIR</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* BARRA LATERAL DE RECETAS */}
                        {pasoActual === null && (
                            <div class="lg:w-80 flex flex-col gap-6">
                                <div class="bg-zinc-900/50 p-6 rounded-[2rem] border border-zinc-800 h-fit">
                                    <h2 class="text-zinc-600 font-black mb-6 uppercase text-[10px] tracking-[0.4em] flex items-center justify-between">
                                        Libro de Recetas
                                        <span class="bg-zinc-800 text-zinc-400 px-2 py-0.5 rounded-md text-[9px]">{recetas.length}</span>
                                    </h2>
                                    <div class="space-y-3 max-h-[60vh] overflow-y-auto pr-2 custom-scroll">
                                        {recetas.length === 0 && (
                                            <div class="text-center p-8 border-2 border-dashed border-zinc-800 rounded-3xl">
                                                <p class="text-zinc-700 text-sm font-bold italic">Tu recetario está vacío</p>
                                            </div>
                                        )}
                                        {recetas.map(r => (
                                            <div key={r.id} class="group flex items-center gap-3 bg-zinc-900 p-4 rounded-2xl hover:border-orange-500/50 border border-transparent transition-all cursor-pointer active:scale-95" onClick={() => cargarReceta(r)}>
                                                <div class="flex-1 min-w-0">
                                                    <p class="font-black text-sm truncate uppercase tracking-tighter">{r.nombre}</p>
                                                    <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">{r.pasos.length} pasos configurados</p>
                                                </div>
                                                <button onClick={(e) => { e.stopPropagation(); setRecetas(recetas.filter(x => x.id !== r.id)); }} class="opacity-0 group-hover:opacity-100 p-2 text-zinc-700 hover:text-red-500 transition-all font-bold">✕</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                
                                <div class="bg-orange-600/10 p-6 rounded-[2rem] border border-orange-600/20">
                                    <p class="text-orange-500 text-[10px] font-black uppercase tracking-widest mb-1">Tip de Cocina</p>
                                    <p class="text-zinc-400 text-xs leading-relaxed">Guardá esta página en tus <b>marcadores</b> de la barra de favoritos para entrar con un clic la próxima vez.</p>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
