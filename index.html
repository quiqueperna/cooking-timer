function AdSlot({ slot, format='auto', className='' }) {
    const ref = useRef(null);
    useEffect(() => {
        try { if (ref.current) (window.adsbygoogle = window.adsbygoogle || []).push({}); }
        catch(e) {}
    }, []);
    return (
        <div className={`adsense-slot ${className}`} ref={ref}>
            <ins className="adsbygoogle"
                style={{display:'block'}}
                data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
                data-ad-slot={slot}
                data-ad-format={format}
                data-full-width-responsive="true"
            />
        </div>
    );
}

// 🌐  LANG SWITCHER
// ══════════════════════════════════════════
function LangSwitcher({ lang, setLang }) {
    const [open, setOpen] = useState(false);
    const cur = LANGS.find(l => l.code === lang);
    return (
        <div className="relative" onBlur={() => setTimeout(()=>setOpen(false),150)}>
            <button onClick={()=>setOpen(!open)} className="flex items-center gap-1.5 bg-zinc-900 border border-zinc-800 rounded-lg px-3 py-1.5 text-[11px] font-black hover:border-zinc-600 transition-all">
                <span>{cur?.label}</span><span className="text-zinc-600">▾</span>
            </button>
            {open && (
                <div className="absolute right-0 top-full mt-2 bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden shadow-2xl z-50 w-44 fade-in">
                    {LANGS.map(l => (
                        <button key={l.code} onClick={()=>{setLang(l.code);setOpen(false);}}
                            className={`w-full flex items-center gap-3 px-4 py-2.5 text-xs font-bold hover:bg-zinc-800 transition-colors text-left ${lang===l.code?'text-orange-400':'text-zinc-300'}`}>
                            <span className="w-7 text-center font-black text-[10px]">{l.label}</span>
                            <span>{l.name}</span>
                            {lang===l.code && <span className="ml-auto text-orange-400 text-[10px]">✓</span>}
                        </button>
                    ))}
                </div>
            )}
        </div>
    );
}

    useEffect(() => {
        sb.auth.getSession().then(({data})=>{setSession(data.session);setAuthLoading(false);});
        const {data:l} = sb.auth.onAuthStateChange((_,s)=>setSession(s));
        return ()=>l.subscription.unsubscribe();
    },[]);

    // Load user's saved language preference from DB after login
    useEffect(() => {
        if (!session) return;
        sb.from('user_prefs').select('lang').eq('user_id', session.user.id).single()
            .then(({data}) => { if (data?.lang && T[data.lang]) setLang(data.lang); });
        loadRecetas();
    }, [session]);

    useEffect(()=>{
        if(lastInputRef.current){lastInputRef.current.focus();lastInputRef.current.select();}
    },[pasos.length]);

    useEffect(()=>{
        let timer;
        if(corriendo && segundos>0) timer=setInterval(()=>setSegundos(s=>s-1),1000);
        else if(segundos===0&&corriendo){setCorriendo(false);setAlarma(true);audioRef.current.play().catch(()=>{});}
        return ()=>clearInterval(timer);
    },[corriendo,segundos]);

    const loadRecetas = async () => {
        setDbLoading(true);
        const {data} = await sb.from('recetas').select('*').order('created_at',{ascending:false});
        if(data) setRecetas(data);
        setDbLoading(false);
    };

    const guardarReceta = async () => {
        if(!nombreReceta.trim()) return alert(t.nameRequired);
        setDbLoading(true);
        const {data} = await sb.from('recetas').insert({user_id:session.user.id,nombre:nombreReceta,descripcion,pasos:JSON.stringify(pasos)}).select().single();
        if(data) setRecetas([data,...recetas]);
        setDbLoading(false);
        alert(t.recipeSaved);
    };

    const eliminarReceta = async (id) => {
        await sb.from('recetas').delete().eq('id',id);
        setRecetas(recetas.filter(r=>r.id!==id));
    };

    const cargarReceta = (r) => {
        const p = typeof r.pasos==='string'?JSON.parse(r.pasos):r.pasos;
        setPasos(p); setNombreReceta(r.nombre); setDescripcion(r.descripcion||'');
    };

    const agregarPaso = () => setPasos([...pasos,{id:Date.now(),instruccion:`${t.newStep} ${pasos.length+1}`,min:1,seg:0}]);
    const editarPaso  = (i,campo,val) => { const np=[...pasos]; np[i][campo]=val; setPasos(np); };

    const iniciarCocina = (idx=0) => {
        if(!pasos.length) return;
        setPasoActual(idx); setSegundos(pasos[idx].min*60+pasos[idx].seg); setCorriendo(true);
    };

    const detenerAlarma = () => {
        audioRef.current.pause(); audioRef.current.currentTime=0; setAlarma(false);
        if(pasoActual<pasos.length-1){ const nx=pasoActual+1; setPasoActual(nx); setSegundos(pasos[nx].min*60+pasos[nx].seg); setCorriendo(true); }
        else setPasoActual(null);
    };

    const fmt = s => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;

    const handleAuth = async (e,email,password) => {
        e.preventDefault(); setAuthLoading(true);
        authMode==='login'
            ? await sb.auth.signInWithPassword({email,password})
            : await sb.auth.signUp({email,password});
        setAuthLoading(false);
    };

    if(authLoading) return <div className="min-h-screen flex items-center justify-center text-zinc-500 font-bold text-sm tracking-widest uppercase">{t.loading}</div>;
    if(!session) return <LoginScreen t={t} authMode={authMode} setAuthMode={setAuthMode} handleAuth={handleAuth} lang={lang} setLang={setLang}/>;

    return (
        <div className={`min-h-screen ${alarma?'alarma-activa':''} transition-colors duration-500`} dir={isRTL?'rtl':'ltr'}>
            {/* NAV */}
            <div className="flex items-center justify-between px-5 py-4 border-b border-zinc-800/60 backdrop-blur-sm sticky top-0 z-20 bg-zinc-950/80">
                <div className="flex items-center gap-2">
                    <span className="text-2xl">👨‍🍳</span>
                    <span className="bebas text-xl tracking-wider text-white">Chef Timer Pro</span>
                </div>
                <div className="flex items-center gap-3">
                    <LangSwitcher lang={lang} setLang={handleSetLang}/>
                    <span className="text-zinc-600 text-xs hidden sm:block truncate max-w-[140px]">{session.user.email}</span>
                    <button onClick={()=>sb.auth.signOut()} className="text-[10px] font-black uppercase tracking-widest text-zinc-500 hover:text-red-400 transition-colors px-3 py-1.5 border border-zinc-800 rounded-lg">
                        {t.logout}
                    </button>
                </div>
            </div>

            {/* TOP BANNER — 728x90 */}
            <div className="px-4 md:px-8 pt-4 pb-2">
                <AdSlot slot="2222222222" format="horizontal"/>
            </div>

            <div className="p-4 md:p-8 pt-2">
                <div className="max-w-5xl mx-auto flex flex-col lg:flex-row gap-8">

                    {/* EDITOR */}
                    {pasoActual===null && (
                        <div className="flex-1 bg-zinc-900/50 backdrop-blur-sm p-6 rounded-[2rem] border border-zinc-800 shadow-2xl fade-in">
                            <div className="space-y-4 mb-8">
                                <input type="text" placeholder={t.whatAreCooking}
                                    className="w-full bg-zinc-800 p-5 rounded-2xl border border-zinc-700 outline-none focus:border-orange-500 font-bold text-lg transition-all"
                                    value={nombreReceta} onChange={e=>setNombreReceta(e.target.value)}/>
                                <textarea placeholder={t.descPlaceholder}
                                    className="w-full bg-zinc-800 p-4 rounded-2xl border border-zinc-700 outline-none focus:border-orange-500 text-sm resize-none h-20"
                                    value={descripcion} onChange={e=>setDescripcion(e.target.value)}/>
                            </div>

                            <div className="space-y-3 mb-6 max-h-[38vh] overflow-y-auto pr-2">
                                <p className="text-[10px] font-black text-zinc-600 uppercase tracking-widest px-2 mb-2">{t.schedule}</p>
                                {pasos.map((p,i)=>(
                                    <div key={p.id} className="flex flex-col sm:flex-row gap-3 bg-zinc-950/80 p-4 rounded-2xl border border-zinc-800 items-center group hover:border-zinc-700 transition-all">
                                        <input ref={i===pasos.length-1?lastInputRef:null} type="text"
                                            className="flex-1 bg-transparent outline-none font-semibold focus:text-orange-400 w-full sm:w-auto"
                                            value={p.instruccion} onChange={e=>editarPaso(i,'instruccion',e.target.value)}
                                            onClick={e=>e.target.select()} onFocus={e=>e.target.select()}/>
                                        <div className="flex items-center gap-2">
                                            <div className="flex items-center bg-zinc-800 rounded-xl px-2">
                                                <input type="number" className="w-10 bg-transparent py-2 text-center font-bold text-orange-500 outline-none"
                                                    value={p.min} onChange={e=>editarPaso(i,'min',parseInt(e.target.value)||0)} onFocus={e=>e.target.select()}/>
                                                <span className="text-[9px] font-bold text-zinc-600 mr-2">M</span>
                                                <input type="number" className="w-10 bg-transparent py-2 text-center font-bold text-orange-500 outline-none"
                                                    value={p.seg} onChange={e=>editarPaso(i,'seg',Math.min(59,parseInt(e.target.value)||0))} onFocus={e=>e.target.select()}/>
                                                <span className="text-[9px] font-bold text-zinc-600 mr-1">S</span>
                                            </div>
                                            <button onClick={()=>setPasos(pasos.filter((_,idx)=>idx!==i))} className="p-2 text-zinc-700 hover:text-red-500 transition-colors">✕</button>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* IN-FEED AD */}
                            <div className="mb-5"><AdSlot slot="3333333333" format="fluid"/></div>

                            <div className="grid grid-cols-2 gap-4">
                                <button onClick={agregarPaso} className="py-4 border-2 border-dashed border-zinc-800 rounded-2xl text-zinc-500 font-black hover:text-zinc-200 hover:border-zinc-600 transition-all text-xs uppercase tracking-widest">
                                    {t.addStep}
                                </button>
                                <button onClick={guardarReceta} disabled={dbLoading} className="py-4 bg-zinc-800 border border-zinc-700 rounded-2xl font-black text-zinc-300 hover:bg-zinc-700 transition-all text-xs uppercase tracking-widest disabled:opacity-40">
                                    {dbLoading?t.saving:t.saveList}
                                </button>
                                <button onClick={()=>iniciarCocina(0)} className="col-span-2 py-5 bg-orange-600 rounded-2xl font-black hover:bg-orange-500 transition-all shadow-xl shadow-orange-950/30 active:scale-95 uppercase bebas text-2xl tracking-widest">
                                    {t.startTimer}
                                </button>
                            </div>
                        </div>
                    )}

                    {/* COOKING MODE */}
                    {pasoActual!==null && (
                        <div className="flex-1 bg-zinc-900 p-8 md:p-16 rounded-[3.5rem] border-4 border-orange-600 text-center shadow-2xl relative flex flex-col justify-center min-h-[70vh] fade-in">
                            <div className="absolute top-8 left-0 right-0 px-8 flex justify-between items-center">
                                <span className="bg-orange-600 text-white text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">
                                    {t.stepOf} {pasoActual+1} {t.of} {pasos.length}
                                </span>
                                <span className="text-zinc-500 font-bold text-xs uppercase tracking-widest">{nombreReceta}</span>
                            </div>
                            <div className="mt-8">
                                {descripcion&&<p className="text-zinc-500 italic text-sm mb-6 max-w-md mx-auto line-clamp-2">"{descripcion}"</p>}
                                <h3 className="text-4xl md:text-6xl font-black mb-8 leading-tight tracking-tighter">{pasos[pasoActual].instruccion}</h3>
                                <div className={`bebas text-[120px] md:text-[180px] leading-none mb-12 tabular-nums text-white drop-shadow-2xl ${corriendo?'pulse-ring rounded-3xl inline-block px-4':''}`}>
                                    {fmt(segundos)}
                                </div>
                            </div>
                            {alarma?(
                                <button onClick={detenerAlarma} className="w-full py-10 bg-white text-black rounded-3xl font-black text-4xl shadow-2xl animate-bounce hover:bg-zinc-100 transition-colors bebas tracking-widest">
                                    {t.stopAlarm}
                                </button>
                            ):(
                                <div className="flex gap-4 max-w-md mx-auto w-full">
                                    <button onClick={()=>setCorriendo(!corriendo)} className={`flex-1 py-6 rounded-2xl font-black text-xl transition-all bebas tracking-widest ${corriendo?'bg-zinc-800 text-zinc-500':'bg-white text-black hover:scale-105 active:scale-95'}`}>
                                        {corriendo?t.pause:t.resume}
                                    </button>
                                    <button onClick={()=>{audioRef.current.pause();setPasoActual(null);}} className="px-8 py-6 bg-zinc-950 rounded-2xl font-bold text-zinc-600 hover:text-red-500 transition-colors">
                                        {t.exit}
                                    </button>
                                </div>
                            )}
                        </div>
                    )}

                    {/* SIDEBAR */}
                    {pasoActual===null && (
                        <div className="lg:w-80 flex flex-col gap-5">
                            {/* SIDEBAR AD — 300x250 */}
                            <AdSlot slot="4444444444" format="rectangle"/>

                            <div className="bg-zinc-900/50 p-6 rounded-[2rem] border border-zinc-800">
                                <h2 className="text-zinc-600 font-black mb-5 uppercase text-[10px] tracking-[0.4em] flex items-center justify-between">
                                    {t.cookbook}
                                    <span className="bg-zinc-800 text-zinc-400 px-2 py-0.5 rounded-md text-[9px]">{recetas.length}</span>
                                </h2>
                                <div className="space-y-3 max-h-[40vh] overflow-y-auto pr-1">
                                    {dbLoading&&<p className="text-zinc-600 text-xs text-center py-4">{t.loading}</p>}
                                    {!dbLoading&&recetas.length===0&&(
                                        <div className="text-center p-8 border-2 border-dashed border-zinc-800 rounded-3xl">
                                            <p className="text-zinc-700 text-sm font-bold italic">{t.emptyBook}</p>
                                        </div>
                                    )}
                                    {recetas.map(r=>(
                                        <div key={r.id} className="group flex items-center gap-3 bg-zinc-900 p-4 rounded-2xl hover:border-orange-500/50 border border-transparent transition-all cursor-pointer active:scale-95" onClick={()=>cargarReceta(r)}>
                                            <div className="flex-1 min-w-0">
                                                <p className="font-black text-sm truncate uppercase tracking-tighter">{r.nombre}</p>
                                                <p className="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">
                                                    {(typeof r.pasos==='string'?JSON.parse(r.pasos):r.pasos).length} {t.stepsLabel}
                                                </p>
                                            </div>
                                            <button onClick={e=>{e.stopPropagation();eliminarReceta(r.id);}} className="opacity-0 group-hover:opacity-100 p-2 text-zinc-700 hover:text-red-500 transition-all font-bold">✕</button>
                                        </div>
                                    ))}
                                </div>
                            </div>


                        </div>
                    )}
                </div>
            </div>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
